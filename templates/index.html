<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex justify-center items-center h-screen">

<div class="bg-gray-800 p-6 rounded text-center w-80">
<h2 class="mb-3">Request WiFi</h2>

<form method="POST">
<input name="name" placeholder="Name" class="w-full mb-2 p-2 text-black rounded">
<input name="mac" placeholder="MAC Address" class="w-full mb-2 p-2 text-black rounded">

<button class="bg-blue-500 w-full py-2 rounded">Send</button>
</form>

<p class="mt-3 text-green-400">{{ message }}</p>

<a href="/login" class="text-blue-400 text-sm mt-3 block">Admin Login</a>
</div>

</body>
</html>
