<!DOCTYPE html>
<html>
<head>
<title>Hotspot Access</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex justify-center items-center h-screen">

<div class="bg-gray-800 p-8 rounded-xl w-80 text-center">
<h2 class="text-xl mb-4">Request Access</h2>

<form method="POST">
<input name="name" placeholder="Name" class="w-full p-2 mb-3 text-black rounded">
<input name="mac" placeholder="MAC Address" class="w-full p-2 mb-3 text-black rounded">
<button class="bg-blue-500 px-4 py-2 w-full rounded">Send</button>
</form>

<p class="mt-3 text-green-400">{{ message }}</p>

<img src="/static/qr.png" class="mt-5 mx-auto" width="120">
</div>

</body>
</html>
