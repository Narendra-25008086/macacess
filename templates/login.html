<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex justify-center items-center h-screen">

<form method="POST" class="bg-gray-800 p-6 rounded text-white w-80">
<h2 class="text-xl mb-4">Admin Login</h2>

<input name="username" placeholder="Username" class="w-full mb-3 p-2 text-black rounded">
<input name="password" type="password" placeholder="Password" class="w-full mb-3 p-2 text-black rounded">

<button class="bg-blue-500 w-full py-2 rounded">Login</button>
</form>

{% if error %}
<script>
alert("{{ error }}");
</script>
{% endif %}

</body>
</html>
