<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-5">

<h2 class="text-2xl mb-3">Admin Panel</h2>

<p class="mb-4">WiFi Password: <b class="text-green-400">{{ password }}</b></p>

<h3>Requests</h3>
<table class="w-full bg-gray-800 mb-5">
<tr><th>ID</th><th>Name</th><th>MAC</th><th>Status</th><th>Action</th></tr>

{% for r in requests %}
<tr>
<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>
<form method="POST" class="flex gap-2">
<input type="hidden" name="id" value="{{ r[0] }}">

<button name="action" value="approved" class="bg-green-500 px-2 rounded">✔</button>
<button name="action" value="rejected" class="bg-yellow-500 px-2 rounded">✖</button>
<button name="action" value="delete" class="bg-red-500 px-2 rounded"
onclick="return confirm('Delete user?')">🗑</button>

</form>
</td>
</tr>
{% endfor %}
</table>

<h3>Access Logs</h3>
<table class="w-full bg-gray-800">
<tr><th>MAC</th><th>Time</th></tr>

{% for l in logs %}
<tr>
<td>{{ l[1] }}</td>
<td>{{ l[2] }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
