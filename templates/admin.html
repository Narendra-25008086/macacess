<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="page">
<div class="main">

<h2>Admin Panel</h2>
<p>Password: {{ password }}</p>

<h3>Requests</h3>

<table>
{% for r in requests %}
<tr>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>
<form method="POST">
<input type="hidden" name="id" value="{{ r[0] }}">
<button name="action" value="approved">✔</button>
<button name="action" value="rejected">✖</button>
<button name="action" value="delete">🗑</button>
</form>
</td>
</tr>
{% endfor %}
</table>

<h3>Logs</h3>
<table>
{% for l in logs %}
<tr>
<td>{{ l[1] }}</td>
<td>{{ l[2] }}</td>
</tr>
{% endfor %}
</table>

</div>

<footer>
<p>MADE BY <span class="footer-name">NARENDRA KRISHAN KS (AIML)</span></p>
</footer>

</div>
</body>
</html>
